spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: tramites-backend
  data:
    mongodb:
      uri: ${MONGODB_URI}
      database: tramitesdb
  web:
    cors:
      allowed-origins: "*"
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}

gcs:
    bucket-name: tramites-documentos-proyecto-2026

logging:
  level:
    org:
      springframework:
        security: TRACE